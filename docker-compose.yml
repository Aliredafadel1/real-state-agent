services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-project:latest
    container_name: ml-project-api
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./src:/app/src
      - ./app:/app/app
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    image: ml-project:latest
    container_name: ml-project-ui
    depends_on:
      - api
    volumes:
      - ./ui:/app/ui
      - ./data:/app/data
      - ./artifacts:/app/artifacts
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8501:8501"
    command: streamlit run ui/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
