version: '3.9'

services:
  ml-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ml-project:latest
    container_name: ml-project
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./src:/app/src
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    # Uncomment to run FastAPI server
    # command: uvicorn src.models.api:app --host 0.0.0.0 --port 8000 --reload
    # Uncomment to run Streamlit app
    # command: streamlit run notebooks/app.py --server.port 8501 --server.address 0.0.0.0
